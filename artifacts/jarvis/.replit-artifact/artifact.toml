kind = "mobile"
previewPath = "/"
title = "Jarvis AI"
version = "1.0.0"
id = "artifacts/jarvis"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20191

[services.development]
run = "pnpm --filter @workspace/jarvis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jarvis", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/jarvis", "run", "serve" ]

[services.env]
PORT = "20191"
BASE_PATH = "/"
