name: Build Jarvis Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.json'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Set Gradle memory
        working-directory: android
        run: |
          echo "" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+UseParallelGC" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Generate release keystore
        working-directory: android
        run: |
          keytool -genkeypair \
            -keystore jarvis-release.keystore \
            -alias jarvis \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jarvis2024 \
            -keypass jarvis2024 \
            -dname "CN=Jarvis AI, OU=Mobile, O=Jarvis, L=RO, S=RO, C=RO" \
            -noprompt

      - name: Add signing config to build.gradle
        working-directory: android/app
        run: |
          sed -i 's/buildTypes {/signingConfigs {\n        jarvisRelease {\n            storeFile file("..\/jarvis-release.keystore")\n            storePassword "jarvis2024"\n            keyAlias "jarvis"\n            keyPassword "jarvis2024"\n        }\n    }\n    buildTypes {/' build.gradle
          sed -i 's/release {/release {\n                signingConfig signingConfigs.jarvisRelease/' build.gradle

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename and stage APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" Jarvis-AI-v3.1.0-release.apk
          ls -lh Jarvis-AI-v3.1.0-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-AI-v3.1.0
          path: Jarvis-AI-v3.1.0-release.apk
          retention-days: 90

      - name: Summary
        run: |
          echo "## Jarvis AI v3.1.0 APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "Descarcă APK-ul din secțiunea **Artifacts** de mai sus." >> $GITHUB_STEP_SUMMARY
